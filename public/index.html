<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#12274a">
  <title>Media Hub · AFC Asian Cup 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Media Hub">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="icon" href="/icons/icon.svg">
</head>
<body>
  <header class="appbar">
    <div class="brand">
      <div class="brand-mark" id="brand-mark"></div>
      <div class="brand-text">
        <div class="brand-title">Media Hub</div>
        <div class="brand-sub" id="brand-sub">AFC Asian Cup 2027</div>
      </div>
    </div>
    <nav class="topnav" id="topnav"></nav>
    <div class="appbar-spacer"></div>
    <div class="appbar-right">
      <span class="clock" id="clock">--:--:--</span>
      <a class="appbar-link" href="/admin" id="admin-link"></a>
    </div>
  </header>

  <main class="view" id="view"></main>

  <nav class="bottomnav" id="bottomnav"></nav>

  <script src="/js/common.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
