# =============================================================================
#  Fly.io configuration. Deploy with:
#     flyctl launch --no-deploy      (creates the app; accept this fly.toml)
#     flyctl secrets set ADMIN_KEY=your-secret DATABASE_URL=postgres://...
#     flyctl deploy
#  (Provision a DB first, e.g.  flyctl postgres create  — or use Neon/Atlas.)
# =============================================================================
app = "afc2027-media-hub"
primary_region = "cdg"

[build]

[env]
  PORT = "3000"
  EVENT_TIMEZONE = "Asia/Riyadh"
  # ADMIN_KEY and DATABASE_URL are set as secrets, NOT here.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
