var _stream = null;
var _scanInterval = null;

function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function localISO(d) {
  return dateStr(d) + 'T' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
}
function fmtTime(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtClock(d) {
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
}
function fmtDateLong(d) {
  try { return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
  catch(e) { return dateStr(d); }
}

function genCode(existing) {
  existing = existing || [];
  var A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', c;
  do { c=''; for (var i=0;i<8;i++) c += A[Math.floor(Math.random()*A.length)]; }
  while (existing.some(function(v){ return v.code === c; }));
  return c;
}
function makeQR(text) {
  if (!window.qrcode) return '';
  try { var qr = window.qrcode(0,'M'); qr.addData(text); qr.make(); return qr.createDataURL(5,8); }
  catch(e) { return ''; }
}

  var venues = [

    {id:'STD-01',name:'North Stadium',type:'Stadium',window:'Match windows',zone:'North District'},
    {id:'STD-02',name:'Harbour Arena',type:'Stadium',window:'Match windows',zone:'Harbour'},

  ];
  var staff = [
    {id:'S-10293',name:'Maria Chen',role:'Press',org:'Global Wire'},
    {id:'S-10485',name:'David Okoye',role:'Broadcast',org:'Intl Broadcast'},
    {id:'S-11002',name:'Sofia Rossi',role:'Catering Liaison',org:'Host Ops'},

  ];

  var vouchers = [];
  Object.keys(weights).forEach(function(h) {
    for (var i=0;i<weights[h];i++) {
      var v = venues[Math.floor(Math.random()*venues.length)];
      var isMMC = v.type === 'MMC';
      var match = isMMC ? null : matches.filter(function(m){ return m.venueId===v.id; })[0];

      var redeemed = Math.random() < 0.79;

      if (redeemed) {
        var add = 5 + Math.floor(Math.random()*38);
        var rd = new Date(issuedAt);
        rd.setMinutes(rd.getMinutes()+add);
        redeemedAt = localISO(rd);
      }

  var sampleCodes = [genCode(vouchers),genCode(vouchers),genCode(vouchers),genCode(vouchers),genCode(vouchers)];
  var notifications = [

    {id:'N1',type:'issued',staffId:'S-10485',staffName:'David Okoye',venueName:'North Stadium',meal:'Match Meal',code:sampleCodes[1],time:d+'T17:48:00'},

function loadDB() {
  var db = null;
  try { db = JSON.parse(localStorage.getItem(KEY)); } catch(e) {}
  if (!db || !db.venues) { db = seed(); }
  var changed = false;
  if (!db.pmpc) { db.pmpc = getPMPC(); changed = true; }
  if (db.pmpcInfo == null) { db.pmpcInfo = 'Informational schedule of Pre-Match Press Conferences (PMPC). All sessions are held at the Main Media Centre, PC Rooms 1 & 2. Media clients should plan meal windows around their briefings.'; changed = true; }
  if (changed) { try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e) {} }
  return db;
}
function saveDB(db) {
  state.db = db;
  try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e) {}
}
function sameDay(iso) {
  return !!iso && iso.slice(0,10) === dateStr(state.now || new Date());
}

// ---- ACTIONS ----
function doRequest() {
  var db = state.db;
  var venue = db.venues.filter(function(v){ return v.id===state.reqVenueId; })[0];
  var id = (state.reqStaffId||'').trim().toUpperCase();
  var staff = db.staff.filter(function(x){ return x.id===id; })[0];

  function deny(reason) {
    var note = {id:'N'+Date.now(),type:'denied',staffId:id||'—',staffName:staff?staff.name:'Unidentified',venueName:venue.name,meal:venue.type==='MMC'?state.reqMeal:'Match Meal',reason:reason,time:localISO(new Date())};
    saveDB(Object.assign({},db,{notifications:[note].concat(db.notifications)}));
    state.result = {status:'denied',reason:reason,staff:staff||{id:id||'—',name:'Unidentified'},venue:venue};
    render();
  }

  if (!id) { deny('Enter a staff accreditation ID to continue.'); return; }
  if (!staff) { deny('Accreditation ID '+id+' is not on the approved staff list for this event.'); return; }

  if (venue.type==='MMC') {
    var ex = db.vouchers.filter(function(v){ return v.staffId===staff.id && v.venueId===venue.id && v.meal===state.reqMeal && sameDay(v.issuedAt); })[0];
    if (ex) { deny(state.reqMeal+' voucher already issued to '+staff.name+' today — daily allowance reached.'); return; }
  } else {
    var match0 = db.matches.filter(function(m){ return m.id===state.reqMatchId; })[0];
    var ex2 = db.vouchers.filter(function(v){ return v.staffId===staff.id && v.matchId===state.reqMatchId; })[0];
    if (ex2) { deny('Match meal voucher already issued to '+staff.name+' for '+(match0?match0.name:'this match')+'.'); return; }
  }

  var match = venue.type==='Stadium' ? db.matches.filter(function(m){ return m.id===state.reqMatchId; })[0] : null;
  var code = genCode(db.vouchers);
  var iso = localISO(new Date());
  var voucher = {code:code,staffId:staff.id,venueId:venue.id,type:venue.type,meal:venue.type==='MMC'?state.reqMeal:'Match Meal',matchId:match?match.id:null,issuedAt:iso,redeemed:false,redeemedAt:null};
  var note = {id:'N'+Date.now(),type:'issued',staffId:staff.id,staffName:staff.name,venueName:venue.name,meal:voucher.meal,code:code,time:iso};
  saveDB(Object.assign({},db,{vouchers:[voucher].concat(db.vouchers),notifications:[note].concat(db.notifications)}));
  var qr = makeQR(code);
  var mealLabel = venue.type==='MMC' ? state.reqMeal : ('Match Meal · '+(match?match.name:''));
  state.result = {status:'issued',voucher:voucher,qr:qr,staff:staff,venue:venue,mealLabel:mealLabel,timeStr:fmtTime(iso)};
  render();
  // Set QR after render
  var qrImg = document.getElementById('qr-img');
  if (qrImg && qr) qrImg.src = qr;
}

function doRedeem(codeArg) {
  var db = state.db;
  var code = (codeArg || state.scanCode || '').trim().toUpperCase();
  if (!code) { state.scanResult = {status:'invalid',msg:'Enter or scan a voucher code.'}; render(); return; }
  var v = db.vouchers.filter(function(x){ return x.code===code; })[0];
  if (!v) { state.scanResult = {status:'invalid',msg:'Code '+code+' is not recognised — no matching voucher.'}; render(); return; }
  var staff = db.staff.filter(function(x){ return x.id===v.staffId; })[0];
  var venue = db.venues.filter(function(x){ return x.id===v.venueId; })[0];
  var who = staff ? staff.name : v.staffId;
  if (v.redeemed) { state.scanResult = {status:'used',voucher:v,who:who,venueName:venue?venue.name:'',msg:'Already redeemed at '+fmtTime(v.redeemedAt)+'.'}; render(); return; }
  var iso = localISO(new Date());
  var nv = db.vouchers.map(function(x){ return x.code===code ? Object.assign({},x,{redeemed:true,redeemedAt:iso}) : x; });
  saveDB(Object.assign({},db,{vouchers:nv}));
  state.scanResult = {status:'ok',voucher:Object.assign({},v,{redeemedAt:iso}),who:who,venueName:venue?venue.name:'',timeStr:fmtTime(iso)};
  state.scanCode = '';
  render();
}

function doAddVenue() {
  var name = (state.nvName||'').trim();
  if (!name) return;
  var db = state.db;
  var pre = state.nvType==='MMC' ? 'MMC' : 'STD';
  var n = db.venues.filter(function(v){ return v.type===state.nvType; }).length + 1;
  var id = pre + '-' + String(n+10).padStart(2,'0');
  var venue = {id:id,name:name,type:state.nvType,window:state.nvType==='MMC'?'08:00 – 23:00':'Match windows',zone:'New Site'};
  saveDB(Object.assign({},db,{venues:db.venues.concat([venue])}));
  state.nvName = '';
  render();
}

function doRemoveVenue(id) {
  var db = state.db;
  saveDB(Object.assign({},db,{venues:db.venues.filter(function(v){ return v.id!==id; }),matches:db.matches.filter(function(m){ return m.venueId!==id; })}));
  if (state.editVenueId===id) state.editVenueId = null;
  render();
}

function doSaveVenue() {
  var db = state.db;
  if (!state.editVenueId) return;
  var venues = db.venues.map(function(v){ return v.id===state.editVenueId ? Object.assign({},v,{name:(state.eName||'').trim()||v.name,type:state.eType,window:(state.eWindow||'').trim()||v.window,zone:(state.eZone||'').trim()||v.zone}) : v; });
  saveDB(Object.assign({},db,{venues:venues}));
  state.editVenueId = null;
  render();
}

function doSavePm() {
  var db = state.db;
  if (state.editPmIdx==null) return;
  var pmpc = db.pmpc.map(function(r,i){ return i===state.editPmIdx ? {date:state.pDate,room:state.pRoom,time:state.pTime,flag:state.pFlag,team:state.pTeam,detail:state.pDetail} : r; });
  saveDB(Object.assign({},db,{pmpc:pmpc}));
  state.editPmIdx = null;
  render();
}

function doRemovePm(i) {
  var db = state.db;
  var ep = state.editPmIdx;
  var pmpc = db.pmpc.filter(function(r,idx){ return idx!==i; });
  saveDB(Object.assign({},db,{pmpc:pmpc}));
  if (ep===i) state.editPmIdx = null;
  else if (ep!=null && ep>i) state.editPmIdx = ep-1;
  render();
}

function doAddPm() {
  if (!(state.npTeam||'').trim()) return;
  var db = state.db;
  var row = {date:(state.npDate||'').trim()||'TBC',room:state.npRoom,time:(state.npTime||'').trim()||'TBC',flag:(state.npFlag||'').trim(),team:(state.npTeam||'').trim(),detail:(state.npDetail||'').trim()};
  saveDB(Object.assign({},db,{pmpc:db.pmpc.concat([row])}));
  state.npDate=''; state.npTime=''; state.npFlag=''; state.npTeam=''; state.npDetail='';
  render();
}

function doSavePmInfo() {
  var db = state.db;
  saveDB(Object.assign({},db,{pmpcInfo:state.pmInfo}));
}

function doReset() {
  try { localStorage.removeItem(KEY); } catch(e) {}
  var db = seed();
  db.pmpc = getPMPC();
  db.pmpcInfo = 'Informational schedule of Pre-Match Press Conferences (PMPC). All sessions are held at the Main Media Centre, PC Rooms 1 & 2. Media clients should plan meal windows around their briefings.';
  saveDB(db);
  state.result = null; state.scanResult = null; state.view = 'dashboard';
  state.editVenueId = null; state.editPmIdx = null; state.reqStaffId = ''; state.nvName = '';
  render();
}

function handleVenueChange(id) {
  var db = state.db;
  var v = db.venues.filter(function(x){ return x.id===id; })[0];
  state.reqVenueId = id; state.result = null;
  if (v.type==='MMC') { state.reqMeal='Lunch'; state.reqMatchId=''; }
  else { var m = db.matches.filter(function(mm){ return mm.venueId===id; })[0]; state.reqMeal='Match Meal'; state.reqMatchId=m?m.id:''; }
  render();
}

async function startCamera() {
  state.cameraOn = true; state.cameraErr = null; state.scanResult = null;
  render();
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    state.cameraOn = false; state.cameraErr = 'Camera API unavailable in this browser — use manual key-in below.'; render(); return;
  }
  try {
    var stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    _stream = stream;
    _videoEl = document.getElementById('cam-video');
    if (_videoEl) { _videoEl.srcObject = stream; _videoEl.play().catch(function(){}); }
    if ('BarcodeDetector' in window) {
      try { _det = new window.BarcodeDetector({formats:['qr_code']}); } catch(e) { _det = new window.BarcodeDetector(); }
      _scanInterval = setInterval(async function(){
        if (!_videoEl || !_det) return;
        try {
          var codes = await _det.detect(_videoEl);
          if (codes && codes.length) { var raw = codes[0].rawValue; stopCamera(); doRedeem(raw); }
        } catch(e) {}
      }, 450);
    } else {
      state.cameraErr = 'Live auto-detection isn’t supported in this browser — the camera is on; use manual key-in, or open in Chrome/Edge for auto-scan.';
      render();
    }
  } catch(e) {
    state.cameraOn = false; state.cameraErr = 'Camera access was denied or is unavailable — use manual key-in below.'; render();
  }
}

function stopCamera() {
  clearInterval(_scanInterval); _scanInterval = null;
  if (_stream) { _stream.getTracks().forEach(function(t){ t.stop(); }); _stream = null; }
  if (_videoEl) { _videoEl.srcObject = null; _videoEl = null; }
  state.cameraOn = false;
  render();
}

function setView(v) {
  if (state.cameraOn) stopCamera();
  state.view = v;
  render();
}

// ---- RENDER ----
function typeStyle(type) {
  return "font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;font-family:'IBM Plex Mono',monospace;" +
    (type==='MMC' ? 'background:color-mix(in srgb,var(--accent) 13%,#fff);color:var(--accent);' : 'background:#fbeede;color:#b3701b;');
}

function card(content, extra) {
  return '<div style="background:#fff;border:1px solid #e4e8ee;border-radius:12px;box-shadow:0 1px 2px rgba(20,30,50,.04);' + (extra||'') + '">' + content + '</div>';
}

function renderDashboard() {
  var db = state.db;
  var today = dateStr(state.now);
  var todays = db.vouchers.filter(function(v){ return v.issuedAt.slice(0,10)===today; });
  var issued = todays.length;
  var redeemed = todays.filter(function(v){ return v.redeemed; }).length;
  var outstanding = issued - redeemed;
  var rate = issued ? Math.round(redeemed/issued*100) : 0;
  var rateStr = rate + '%';
  var activeVenues = db.venues.filter(function(vn){ return todays.some(function(v){ return v.venueId===vn.id; }); }).length;

  var byHour = {}; for (var h=8; h<=22; h++) byHour[h]=0;
  todays.forEach(function(v){ var hh=new Date(v.issuedAt).getHours(); if (byHour[hh]!=null) byHour[hh]++; });
  var maxH = Math.max.apply(null,[1].concat(Object.keys(byHour).map(function(k){ return byHour[k]; })));

    card('<div style="font-family:\'IBM Plex Mono\',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#8893a3;">Redemption Rate</div><div style="font-size:32px;font-weight:700;margin-top:8px;line-height:1;color:var(--accent);">'+rateStr+'</div><div style="font-size:11.5px;color:#8893a3;margin-top:7px;">catering-waste control</div>','padding:18px;') +
    card('<div style="font-family:\'IBM Plex Mono\',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#8893a3;">Active Venues</div><div style="font-size:32px;font-weight:700;margin-top:8px;line-height:1;">'+activeVenues+'</div><div style="font-size:11.5px;color:#8893a3;margin-top:7px;">of '+db.venues.length+' nodes</div>','padding:18px;') +

  var charts = '<div style="display:grid;grid-template-columns:1.7fr 1fr;gap:16px;">' +
    card('<div style="display:flex;justify-content:space-between;align-items:baseline;"><span style="font-size:13.5px;font-weight:600;">Issuance by Hour</span><span style="font-size:11px;font-weight:600;color:var(--accent);font-family:\'IBM Plex Mono\',monospace;">Peak '+String(pk).padStart(2,'0')+':00</span></div><div style="display:flex;align-items:stretch;gap:6px;height:170px;margin-top:20px;">'+bars+'</div>','padding:20px;min-width:0;') +

function escHtml(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (s==null) return '';
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,' ');
}

function renderContent() {
  if (!state.db) return '<div style="color:#9aa4b2;font-size:14px;">Loading...</div>';
  switch (state.view) {
    case 'dashboard': return renderDashboard();
    case 'request': return renderRequest();
    case 'scan': return renderScan();
    case 'notifications': return renderNotifications();
    case 'config': return renderConfig();
    case 'pmpc': return renderPMPC();
    default: return '';
  }
}

var _shellRendered = false;

function render() {
  var app = document.getElementById('app');
  if (!_shellRendered) {
    app.innerHTML = renderShell();
    _shellRendered = true;
  } else {
    // Update nav active states
    NAV_ITEMS.forEach(function(item){
      var active = state.view === item.key;
      var btns = app.querySelectorAll('aside nav button');
      btns.forEach(function(btn){
        var labelEl = btn.querySelector('span:first-child');
        if (labelEl && labelEl.textContent === item.label) {
          btn.style.background = active ? 'var(--accent)' : 'transparent';
          btn.style.color = active ? '#fff' : '#a7b0bf';
          var subEl = btn.querySelector('span:last-child');
          if (subEl) subEl.style.opacity = active ? '.85' : '.55';
        }
      });
    });
    // Update header title
    var titles = VIEW_TITLES[state.view] || ['',''];
    var headerSpans = app.querySelectorAll('header > div:first-child span');
    if (headerSpans[0]) headerSpans[0].textContent = titles[0];
    if (headerSpans[1]) headerSpans[1].textContent = titles[1];
  }
  var content = document.getElementById('content');
  if (content) content.innerHTML = renderContent();

  // Post-render: set QR image if needed
  if (state.result && state.result.status === 'issued' && state.result.qr) {
    var qrImg = document.getElementById('qr-img');
    if (qrImg) qrImg.src = state.result.qr;
  }
  // Re-attach camera video if camera is on
  if (state.cameraOn && _stream) {
    _videoEl = document.getElementById('cam-video');
    if (_videoEl && !_videoEl.srcObject) {
      _videoEl.srcObject = _stream;
      _videoEl.play().catch(function(){});
    }
  }
}

function renderClock() {
  var clockEl = document.getElementById('clock');
  var dateEl = document.getElementById('date-line');
  if (clockEl) clockEl.textContent = fmtClock(state.now);
  if (dateEl) dateEl.textContent = fmtDateLong(state.now);
}

// ---- INIT ----
(function init() {
  var db = loadDB();
  state.db = db;
  state.pmInfo = db.pmpcInfo || '';
  // Set default reqMatchId for stadium venues
  var reqVenue = db.venues.filter(function(v){ return v.id===state.reqVenueId; })[0];
  if (reqVenue && reqVenue.type === 'Stadium') {
    var m = db.matches.filter(function(mm){ return mm.venueId===state.reqVenueId; })[0];
    state.reqMatchId = m ? m.id : '';
  }

  render();

  setInterval(function(){
    state.now = new Date();
    renderClock();
  }, 1000);
})();
</script>
</body>
</html>
