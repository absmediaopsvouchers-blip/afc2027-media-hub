# =============================================================================
#  Render Blueprint — one-click deploy of the AFC 2027 Media Hub.
#
#  In the Render dashboard: New + → Blueprint → connect this repo.
#  This provisions a free web service AND a free Postgres database, and wires
#  DATABASE_URL automatically. Set ADMIN_KEY to your own secret before going live.
#
#  Docs: https://render.com/docs/blueprint-spec
# =============================================================================
services:
  - type: web
    name: afc2027-media-hub
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afc2027-media-db
          property: connectionString
      - key: ADMIN_KEY
        sync: false # set this yourself in the dashboard (keep it secret)
      - key: VOLUNTEER_KEY
        sync: false # scoped key for volunteers (redeem-only) — set in the dashboard
      - key: EVENT_TIMEZONE
        value: Asia/Riyadh
      - key: NODE_VERSION
        value: "20"

databases:
  - name: afc2027-media-db
    plan: free
